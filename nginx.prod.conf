server {
    listen 80 default_server;
    server_name _;
    server_tokens off;

    # Docker's embedded DNS. A static `upstream` block resolves `backend` once
    # at nginx startup, so every backend container recreation (new IP) turned
    # into 502s until the frontend was also restarted. Using a variable in
    # proxy_pass forces per-request re-resolution against this resolver.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $ocdj_backend http://backend:8002;

    # Uploads to /api/organize/pipeline/upload/ can be full-album FLAC batches.
    # Cap generously but not infinite.
    client_max_body_size 500m;
    client_body_timeout 300s;
    send_timeout 300s;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml+rss application/xml image/svg+xml;

    root /usr/share/nginx/html;
    index index.html;

    # Vite-hashed assets: immutable long cache
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API → Django
    location /api/ {
        proxy_pass $ocdj_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_request_buffering off;  # stream uploads through, don't buffer whole body first
    }

    # Django admin (behind CF Access anyway)
    location /admin/ {
        proxy_pass $ocdj_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        proxy_pass $ocdj_backend;
    }

    # SPA fallback — index.html must never cache or users get stuck on old builds
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri $uri/ /index.html;
    }
}
